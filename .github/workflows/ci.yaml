name: Tests

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  pull_request:
  # Triggered on push by .github/workflows/release.yaml
  workflow_call:
    outputs:
      artifact-prefix:
        description: build_snap.yaml `artifact-prefix` output
        value: ${{ jobs.build.outputs.artifact-prefix }}

permissions: {}
jobs:
  build:
    name: Build snap
    uses: canonical/data-platform-workflows/.github/workflows/build_snap.yaml@remove-candid
    permissions:
      actions: read  # Needed for GitHub API call to get workflow version
      contents: read
