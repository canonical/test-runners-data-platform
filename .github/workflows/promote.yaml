name: Promote charm

on:
  workflow_dispatch:
    inputs:
      from-risk:
        description: Promote from this Charmhub risk
        required: true
        type: choice
        options:
          - edge
          - beta
          - candidate
      to-risk:
        description: Promote to this Charmhub risk
        required: true
        type: choice
        options:
          - beta
          - candidate
          - stable

jobs:
  promote:
    name: Promote charms
    uses: canonical/data-platform-workflows/.github/workflows/_promote_charms_legacy_2.yaml@charmcraft-candid
    with:
      track: 'latest'
      from-risk: ${{ inputs.from-risk }}
      to-risk: ${{ inputs.to-risk }}
      charmcraft-snap-revision: 8137  # 4.4.0 (edge release)
    secrets:
      charmhub-token: ${{ secrets.CHARMHUB_TOKEN_PROMOTION }}
    permissions:
      contents: write  # Needed to edit GitHub releases
