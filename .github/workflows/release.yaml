name: Release to Charmhub edge

on:
  push:
    branches:
      - main

jobs:
  tag:
    name: Create charm refresh compatibility version git tag
    uses: canonical/data-platform-workflows/.github/workflows/tag_charm_edge.yaml@v50.1.0
    with:
      track: 'latest'
    permissions:
      contents: write  # Needed to create git tag

  ci-tests:
    name: Tests
    needs:
      - tag
    uses: ./.github/workflows/ci.yaml

  release:
    name: Release charm
    needs:
      - tag
      - ci-tests
    uses: canonical/data-platform-workflows/.github/workflows/release_charm_edge.yaml@charmcraft-candid
    with:
      track: ${{ needs.tag.outputs.track }}
      artifact-prefix: ${{ needs.ci-tests.outputs.artifact-prefix }}
      charmcraft-snap-revision: 8137  # 4.4.0 (edge release)
    secrets:
      charmhub-token: ${{ secrets.CHARMHUB_TOKEN_EDGE }}
    permissions:
      contents: write  # Needed to create git tags
